server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Health check for ALB ─────────────────────────────────────────────────
    # ALB hits this every 30s to decide if the instance is healthy.
    # Returns 200 immediately — no filesystem or DB dependency.
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"frontend"}';
        add_header Content-Type application/json;
    }

    # ── React SPA — serve index.html for all routes ───────────────────────────
    # React Router handles /dashboard, /transactions etc on the client side.
    # Nginx just needs to serve index.html for any path that isn't a real file.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets — long cache ────────────────────────────────────────────
    # React build gives JS/CSS unique hashes in filenames so 1-year cache is safe.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}

